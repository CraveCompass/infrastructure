services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    image: ghcr.io/cravecompass/cravecompass-api:latest
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      - PORT=8080
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crave-api.rule=Host(`api.ddokubi.ovh`)"
      - "traefik.http.services.crave-api.loadbalancer.server.port=8080"

  web:
    image: ghcr.io/cravecompass/cravecompass-web:latest
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crave-web.rule=Host(`ddokubi.ovh`)"
      - "traefik.http.services.crave-web.loadbalancer.server.port=3000"

volumes:
  pgdata:

networks:
  dokploy-network:
    external: true
